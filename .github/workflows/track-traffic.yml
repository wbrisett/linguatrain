name: Track repo traffic

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  record-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch clone traffic
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p traffic
          curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/clones?per=day" \
            > traffic/clones_raw.json

      - name: Fetch view traffic
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/views?per=day" \
            > traffic/views_raw.json

      - name: Merge into CSVs
        run: |
          python3 - << 'PYEOF'
          import json, csv, os

          def merge(raw_file, csv_file, key):
              with open(raw_file) as f:
                  data = json.load(f)

              existing = set()
              if os.path.exists(csv_file):
                  with open(csv_file, newline="") as f:
                      for row in csv.DictReader(f):
                          existing.add(row["date"])
              else:
                  with open(csv_file, "w", newline="") as f:
                      csv.DictWriter(f, fieldnames=["date","count","uniques"]).writeheader()

              new_rows = [
                  {"date": e["timestamp"][:10], "count": e["count"], "uniques": e["uniques"]}
                  for e in data.get(key, [])
                  if e["timestamp"][:10] not in existing
              ]

              if new_rows:
                  with open(csv_file, "a", newline="") as f:
                      csv.DictWriter(f, fieldnames=["date","count","uniques"]).writerows(new_rows)
                  print(f"{csv_file}: appended {len(new_rows)} row(s)")
              else:
                  print(f"{csv_file}: no new data")

          merge("traffic/clones_raw.json", "traffic/clones.csv", "clones")
          merge("traffic/views_raw.json",  "traffic/views.csv",  "views")
          PYEOF

      - name: Commit updated traffic data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/clones.csv traffic/views.csv
          git diff --cached --quiet || git commit -m "chore: update traffic data [skip ci]"
          git push origin HEAD:refs/heads/traffic-data
