# millainen_opposites.yml
meta:
  title: "Millainen? — vastakohdat (opposites)"
  source: "Sanasto kappale 3 (worksheet photo)"
  language: "fi"
  notes:
    - "phon is a simple English-friendly guide, not IPA"

pairs:
  - id: good_bad
    a:
      fi: "hyvä"
      en: "good"
      phon: "HOO-vah (hy- is like German ü)"
    b:
      fi: "huono"
      en: "bad"
      phon: "HOO-oh-noh"

  - id: hard_easy
    a:
      fi: "vaikea"
      en: "difficult"
      phon: "VAI-keh-ah"
    b:
      fi: "helppo"
      en: "easy"
      phon: "HELP-poh"

  - id: hot_cold
    a:
      fi: "kuuma"
      en: "hot"
      phon: "KOO-mah"
    b:
      fi: "kylmä"
      en: "cold"
      phon: "KÜL-mah (y is like German ü)"

  - id: new_old
    a:
      fi: "uusi"
      en: "new"
      phon: "OO-see"
    b:
      fi: "vanha"
      en: "old"
      phon: "VAHN-ha"

  - id: small_big
    a:
      fi: "pieni"
      en: "small"
      phon: "PEE-eh-nee"
    b:
      fi: "iso / suuri"
      en: "big"
      phon: "EE-soh / SOO-ree"

  - id: beautiful_ugly
    a:
      fi: "kaunis"
      en: "beautiful"
      phon: "KOW-niss (kow as in 'cow')"
    b:
      fi: "ruma"
      en: "ugly"
      phon: "ROO-mah"

  - id: bright_dark
    a:
      fi: "valoisa"
      en: "bright (well-lit)"
      phon: "VAH-loy-sah"
    b:
      fi: "pimeä"
      en: "dark"
      phon: "PEE-meh-ah"

  - id: warm_cool
    a:
      fi: "lämmin"
      en: "warm"
      phon: "LAM-min (ä like 'a' in 'cat')"
    b:
      fi: "viileä"
      en: "cool"
      phon: "VEE-leh-ah"

  - id: fast_slow
    a:
      fi: "nopea"
      en: "fast"
      phon: "NO-peh-ah"
    b:
      fi: "hidas"
      en: "slow"
      phon: "HEE-dahs"

  - id: long_short
    a:
      fi: "pitkä"
      en: "long / tall"
      phon: "PIT-kah (ä like 'a' in 'cat')"
    b:
      fi: "lyhyt"
      en: "short"
      phon: "LÜ-hüt (y like German ü)"

  - id: many_few
    a:
      fi: "paljon"
      en: "a lot / many"
      phon: "PAL-yon"
    b:
      fi: "vähän"
      en: "a little / few"
      phon: "VAH-han (ä like 'a' in 'cat')"