metadata:
  id: suomen_mestari_1_meidan_tavallinen_paiva_conjugate
  title: Meidän tavallinen päivä — Verb Conjugation Pack
  type: conjugation
  format: canonical
  version: 10
  schema_version: 1
  source_pack: suomen_mestari_1_meidan_tavallinen_paiva_vocabulary
  notes:
  - Present positive and negative forms for verbs encountered in the passage.
  - Each entry declares its verb category for category-drill mode.
  - Corrected stem on gradating Type 1 verbs (pukea, lukea, loppua, nukkua) from the weak grade (incorrectly derived by stripping -n from minä-positive) to the citation-derived strong grade, per corrected spec §6.2.1a. The weak-grade alternation itself remains fully documented in each entry's notes.
subjects:
- minä
- sinä
- hän
- me
- te
- he
entries:
- id: '001'
  lemma: olla
  gloss: to be
  category:
    key: type_irregular
    label: Irregular
  stem: ole-
  notes:
  - Personal forms don't follow a predictable stem+ending pattern, e.g. olla → olen, on, ovat.
  forms:
    minä:
      positive:
        forms:
        - olen
        meaning: I am
      negative:
        forms:
        - en ole
        meaning: I am not
    sinä:
      positive:
        forms:
        - olet
        meaning: you are
      negative:
        forms:
        - et ole
        meaning: you are not
    hän:
      positive:
        forms:
        - 'on'
        meaning: he/she is
      negative:
        forms:
        - ei ole
        meaning: he/she is not
    me:
      positive:
        forms:
        - olemme
        meaning: we are
      negative:
        forms:
        - emme ole
        meaning: we are not
    te:
      positive:
        forms:
        - olette
        meaning: you are
      negative:
        forms:
        - ette ole
        meaning: you are not
    he:
      positive:
        forms:
        - ovat
        meaning: they are
      negative:
        forms:
        - eivät ole
        meaning: they are not
