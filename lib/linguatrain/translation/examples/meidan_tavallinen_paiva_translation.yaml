- id: '003'
  source: Minulla on vaimo ja kaksi lasta.
  phonetic: MEE-nool-lah ohn VAI-moh yah KAHK-see LAHS-tah
  literal: On-me is wife and two of-child.
  target: I have a wife and two children.
  chunks:
  - id: c1
    source: Minulla on
    phonetic: MEE-nool-lah ohn
    literal: on me is
    target: I have
    hint: 'Finnish has no verb "to have": possession is expressed with the adessive
      case (minulla, "on me") plus olla, "to be."'
  - id: c2
    source: vaimo
    phonetic: VAI-moh
    literal: wife
    target: a wife
  - id: c3
    source: ja
    phonetic: yah
    literal: and
    target: and
  - id: c4
    source: kaksi lasta.
    phonetic: KAHK-see LAHS-tah
    literal: two of-child
    target: two children
    hint: A quantity word like kaksi ("two") is followed by the partitive singular
      of the noun, not the plural.
  vocabulary_refs:
  - minä
  - olla
  - vaimo
  - kaksi
  - lapsi
  grammar:
    refs:
    - possessive_adessive_construction
    - partitive_after_numbers
- id: '004'
