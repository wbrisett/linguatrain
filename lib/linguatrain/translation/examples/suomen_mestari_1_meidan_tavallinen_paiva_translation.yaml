- id: e002
  type: narrative
  source: Minä olen Lauri Mäkelä. Olen suomalainen mies ja isä.
  phonetic: MEE-nah OH-lehn LAU-ree MAH-keh-lah. OH-lehn SOO-oh-mah-lai-nehn MEE-ehs yah EE-sah
  literal: I am Lauri Mäkelä. Am Finnish man and father.
  target: I am Lauri Mäkelä. I am a Finnish man and father.
  chunks:
  - id: c001
    source: Minä olen Lauri Mäkelä
    phonetic: MEE-nah OH-lehn LAU-ree MAH-keh-lah
    literal: I am Lauri Mäkelä
    target: I am Lauri Mäkelä
    hint: Olen is the first-person present form of olla.
  - id: c002
    source: Olen suomalainen mies
    phonetic: OH-lehn SOO-oh-mah-lai-nehn MEE-ehs
    literal: am Finnish man
    target: I am a Finnish man
    hint: Finnish can omit the subject when the verb form already shows the person.
  - id: c003
    source: ja isä
    phonetic: yah EE-sah
    literal: and father
    target: and father
    accepted:
    - and a father
  vocabulary_refs:
  - minä
  - olla
  - suomalainen
  - mies
  - ja
  - isä
  grammar:
    refs:
    - olla_present
    - subject_pronoun_omission
- id: e003
  type: narrative
  source: Minulla on vaimo ja kaksi lasta.
  phonetic: MEE-nool-lah OHN VAI-moh yah KAHK-see LAHS-tah
  literal: On me is wife and two children.
  target: I have a wife and two children.
  chunks:
  - id: c001
    source: Minulla on
    phonetic: MEE-nool-lah OHN
    literal: on me is
    target: I have
    hint: Finnish expresses possession as <person> + on (using the adessive case).
  - id: c002
    source: vaimo
    phonetic: VAI-moh
    literal: wife
    target: wife
    accepted:
    - a wife
  - id: c003
    source: ja
    phonetic: yah
    literal: and
    target: and
  - id: c004
    source: kaksi lasta
    phonetic: KAHK-see LAHS-tah
    literal: two child
    target: two children
    hint: After numbers, Finnish uses the partitive singular form.
  vocabulary_refs:
  - minä
  - olla
  - vaimo
  - ja
  - kaksi
  - lapsi
  grammar:
    refs:
