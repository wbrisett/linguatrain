    - at 7:15 AM
    - at seven fifteen
    - at seven-fifteen
    hint: Kello introduces the time.
  - id: c003
    source: Olen töissä lounasravintolassa
    phonetic: OH-lehn TOISS-sah LOW-nahs-rah-veen-toh-lahs-sah
    literal: I am at work in lunch restaurant
    target: I work in a lunch restaurant
    accepted:
    - I am at work in a lunch restaurant
    - I work at a lunch restaurant
    hint: 'Töissä is the location form: being at work; -ssa also marks location in lounasravintolassa.'
