- id: e005
  type: narrative
  source: Käyn ensin suihkussa ja puen sitten päälle.
  phonetic: KAIN EHN-seen SOOYK-hoos-sah yah POO-ehn SEET-tehn PAAL-leh
  literal: I go first in shower and put then on.
  target: First I take a shower, and then I get dressed.
  chunks:
  - id: c001
    source: Käyn ensin suihkussa
    phonetic: KAIN EHN-seen SOOYK-hoos-sah
    literal: I go first in shower
    target: First I take a shower
    hint: Käydä suihkussa is a fixed expression for taking a shower.
  - id: c002
    source: ja puen sitten päälle
    phonetic: yah POO-ehn SEET-tehn PAAL-leh
    literal: and put then on
    target: and then I get dressed
    hint: Pukea päälle is a fixed expression for putting clothes on or getting dressed.
  vocabulary_refs:
  - käydä
  - ensin
  - suihku
  - ja
  - pukea
  - sitten
  - päälle
  grammar:
    refs:
    - inessive_case
    - verb_phrase
- id: e006
  type: narrative
  source: Sen jälkeen teen keittiössä aamupalaa ja luen lehteä.
  phonetic: SEHN YAL-kehn TEHN KAYT-tee-urss-sah AH-moo-pah-lah yah LOO-ehn LEH-teh-ah
  literal: Its after I make in kitchen breakfast and I read newspaper.
  target: After that I make breakfast in the kitchen and read the newspaper.
  chunks:
  - id: c001
    source: Sen jälkeen
    phonetic: SEHN YAL-kehn
    literal: its after
    target: after that
    hint: Jälkeen is a postposition; the word before it appears in the genitive.
  - id: c002
    source: teen keittiössä aamupalaa
    phonetic: TEHN KAYT-tee-urss-sah AH-moo-pah-lah
    literal: I make in kitchen breakfast
    target: I make breakfast in the kitchen
    hint: Keittiössä uses the -ssä ending for location inside or at a place.
  - id: c003
    source: ja luen lehteä
    phonetic: yah LOO-ehn LEH-teh-ah
    literal: and I read newspaper
    target: and read the newspaper
    hint: Lehteä is the partitive form, used here for reading some newspaper material.
  vocabulary_refs:
  - se
  - jälkeen
  - tehdä
  - keittiö
  - aamupala
  - ja
  - lukea
  - lehti
  grammar:
    refs:
    - postposition_jälkeen
    - inessive_case
    - partitive_case
- id: e007
  type: narrative
  source: Kun Tuula ja lapset heräävät, syömme yhdessä aamupalaa.
  phonetic: KOON TOO-lah yah LAHP-seht HEH-raa-vaht, SYURM-meh YUH-dehs-sah AH-moo-pah-lah
  literal: When Tuula and children wake up, we eat together breakfast.
  target: When Tuula and the children wake up, we eat breakfast together.
  chunks:
  - id: c001
    source: Kun Tuula ja lapset heräävät
    phonetic: KOON TOO-lah yah LAHP-seht HEH-raa-vaht
    literal: when Tuula and children wake up
    target: when Tuula and the children wake up
    hint: Heräävät is the third-person plural present form.
  - id: c002
    source: syömme yhdessä aamupalaa
    phonetic: SYURM-meh YUH-dehs-sah AH-moo-pah-lah
    literal: we eat together breakfast
    target: we eat breakfast together
    hint: -mme marks the first-person plural 'we' ending; aamupalaa is partitive.
  vocabulary_refs:
  - kun
  - ja
  - lapsi
