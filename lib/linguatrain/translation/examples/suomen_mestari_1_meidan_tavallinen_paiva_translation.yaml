- id: e001
  type: narrative
  source: Meidän tavallinen päivä
  phonetic: MAY-dahn TAH-vahl-lee-nehn PAI-vah
  literal: Our ordinary day.
  target: Our ordinary day
  chunks:
  - id: c001
    source: Meidän
    phonetic: MAY-dahn
    literal: our
    target: our
    hint: 'Meidän is the genitive form used for possession: ''our''.'
  - id: c002
    source: tavallinen päivä
    phonetic: TAH-vahl-lee-nehn PAI-vah
    literal: ordinary day
    target: ordinary day
