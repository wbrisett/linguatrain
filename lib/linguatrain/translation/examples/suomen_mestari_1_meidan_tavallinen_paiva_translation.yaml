    phonetic: LAHP-seht SYUR-vaht YU-lehn-sah MOO-roh-yah
    literal: children eat usually cereal
    target: The children usually eat cereal
    hint: Syövät is the third-person plural form; muroja is partitive plural.
  - id: c002
    source: ja minä syön leipää
    phonetic: yah MEE-nah SYURN LAY-paah
    literal: and I eat bread
    target: and I eat bread
