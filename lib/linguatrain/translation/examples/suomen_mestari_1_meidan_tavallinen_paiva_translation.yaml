  literal: At home Tuula makes food. Food’s after children want to watch television.
  target: At home Tuula makes food. After the meal the children want to watch television.
  chunks:
  - id: c001
    source: Kotona Tuula tekee ruokaa
    phonetic: KOH-toh-nah TOO-lah TEH-keh ROO-oh-kah
    literal: at home Tuula makes food
    target: At home Tuula makes food
    hint: Kotona is a fixed location form meaning being at home; ruokaa is partitive.
  - id: c002
    source: Ruoan jälkeen
    phonetic: ROO-ahn YAL-kehn
    literal: food’s after
    target: After the meal
    hint: Jälkeen follows the genitive form ruoan.
  - id: c003
    source: lapset haluavat katsoa televisiota
    phonetic: LAHP-seht HAH-loo-ah-vaht KAHT-soh-ah TEH-leh-vee-see-oh-tah
    literal: children want to watch television
    target: the children want to watch television
    hint: Haluta is followed by the basic infinitive form of the next verb.
