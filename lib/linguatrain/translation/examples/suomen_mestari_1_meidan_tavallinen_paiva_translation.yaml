- id: e004
  type: narrative
  source: Minä herään kello 6, kun herätyskello soi.
  phonetic: MEE-nah HEH-raan KEHL-loh KOO-see, koon HEH-rah-tus-KEHL-loh soy
  literal: I wake up clock 6, when alarm clock rings.
  target: I wake up at 6:00 when the alarm clock rings.
  chunks:
  - id: c001
    source: Minä herään
    phonetic: MEE-nah HEH-raan
    literal: I wake up
    target: I wake up
    hint: Herään is the first-person present form of the Type 4 verb herätä.
  - id: c002
    source: kello 6
    phonetic: KEHL-loh KOO-see
    literal: clock 6
    target: at 6:00
    accepted:
    - at 6
    - at six
    - at six o'clock
    hint: Kello introduces clock time.
  - id: c003
    source: kun
    phonetic: koon
    literal: when
    target: when
  - id: c004
    source: herätyskello soi
    phonetic: HEH-rah-tus-KEHL-loh soy
    literal: alarm clock rings
    target: the alarm clock rings
    accepted:
    - alarm clock rings
    - the alarm clock sounds
    - alarm clock sounds
    hint: Soi is the present-tense form used for a sound or ringing.
  vocabulary_refs:
