    source: Lähden töihin
    phonetic: LAH-dehn TOI-heen
    literal: I leave to work
    target: I leave for work
    hint: 'Töihin is the directional form: movement to work.'
  - id: c002
    source: kello 7.15
    phonetic: KEHL-loh SAYT-seh-mahn VEE-see-toys-tah
    literal: clock 7.15
    target: at 7:15
