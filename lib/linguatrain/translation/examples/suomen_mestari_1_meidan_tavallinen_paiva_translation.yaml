- id: e023
  type: narrative
  source: Tuula ja lapset lukevat kirjaa. Yhdeksältä lapset pesevät hampaat.
  phonetic: TOO-lah yah LAHP-seht LOO-keh-vaht KEER-yah. UH-dehk-sahl-tah LAHP-seht PEH-seh-vaht HAHM-paht
  literal: Tuula and children read book. From nine children wash teeth.
  target: Tuula and the children read a book. At nine the children brush their teeth.
  chunks:
  - id: c001
    source: Tuula ja lapset lukevat kirjaa
    phonetic: TOO-lah yah LAHP-seht LOO-keh-vaht KEER-yah
    literal: Tuula and children read book
    target: Tuula and the children read a book
    hint: Kirjaa is partitive, used for reading some or part of a book.
  - id: c002
    source: Yhdeksältä lapset pesevät hampaat
    phonetic: UH-dehk-sahl-tah LAHP-seht PEH-seh-vaht HAHM-paht
    literal: from nine children wash teeth
    target: At nine the children brush their teeth
    accepted:
    - At 9 the children brush their teeth
    - At 9:00 the children brush their teeth
    hint: Yhdeksältä is the time form for 'at nine'; Finnish says wash teeth.
  vocabulary_refs:
  - Tuula
  - lapsi
  - lukea
  - kirja
  - yhdeksän
  - pestä
  - hammas
  grammar:
    refs:
    - ablative_time
    - partitive_case
