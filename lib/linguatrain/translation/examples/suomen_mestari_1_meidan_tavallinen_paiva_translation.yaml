- id: e008
  type: narrative
  source: Lapset syövät yleensä muroja ja minä syön leipää.
  phonetic: LAHP-seht SYUR-vaht YU-lehn-sah MOO-roh-yah yah MEE-nah SYURN LAY-paah
  literal: Children eat usually cereal and I eat bread.
  target: The children usually eat cereal, and I eat bread.
