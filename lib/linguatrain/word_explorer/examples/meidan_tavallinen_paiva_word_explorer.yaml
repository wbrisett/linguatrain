metadata:
  id: 'meidan_tavallinen_paiva_word_explorer'
  title: 'Meidän tavallinen päivä — Word Explorer'
  type: word_explorer
  format: canonical
  version: 1
  schema_version: 1

  category: daily_life
  chapter: 2

  source_pack: 'suomen_mestari_1_meidan_tavallinen_paiva_translation'

grammar:
  - key: nominative
    name: Nominative
    plain_english: 'base form'
    description: >
      The Nominative is the basic form of the word.

  - key: genitive
    name: Genitive
    plain_english: 'of / belonging to'
    description: >
      The Genitive commonly marks possession or shows that one word modifies
      another word.

  - key: partitive
    name: Partitive
    plain_english: 'some / part of / unbounded'
    description: >
      The Partitive can mark an incomplete amount, an unbounded quality, the
      object of an ongoing action, or the noun that follows a quantity word
      such as kaksi.

  - key: inessive
    name: Inessive
    plain_english: 'in / inside'
    description: >
      The Inessive expresses location inside something. It also appears in
      fixed expressions such as käydä suihkussa, "to take a shower."

  - key: illative
    name: Illative
    plain_english: 'into / to (movement in)'
    description: >
      The Illative expresses movement into or toward something. It also
      marks the goal of a purposive construction with the third infinitive,
      as in menee nukkumaan, "goes to sleep."

  - key: adessive
    name: Adessive
    plain_english: 'on / at / by means of'
    description: >
      The Adessive commonly expresses location on or at something, or the
      means used to do something. Combined with olla, it also expresses
      possession, as in minulla on, "I have."

  - key: ablative
    name: Ablative
    plain_english: 'from / at (a time)'
    description: >
      The Ablative expresses movement away from something. Finnish also uses
      it for a clock-time answer to "at what time," as in kahdelta, "at two
      o'clock."

  - key: allative
    name: Allative
    plain_english: 'to / onto / for'
    description: >
      The Allative expresses movement toward something or someone. It can
      also mark the person who experiences something.

  - key: elative
    name: Elative
    plain_english: 'out of / from inside'
    description: >
      The Elative expresses movement out of or away from inside something,
      the reverse of the Inessive.

entries:
  - id: 'm001'

    source:
      entry_id: '002'
      chunk_id: c2
      text: 'Olen suomalainen mies ja isä.'
      literal: 'I-am Finnish man and father.'
      target: "I'm a Finnish man and a father."

    word: 'suomalainen'
    base_word: 'suomi'
    type: 'adjective'

    target: 'Finnish (person)'

    morphology:
      kind: 'derivation'
      suffix: '-lainen'
      source_type: 'noun'
      result_type: 'demonym'

    hint: >
      This word is built from the name of a country.

    formation: 'suomi → suoma- + -lainen → suomalainen'

    explanation: >
      Suomalainen is built from Suomi with the demonym suffix -lainen, which
      names a person or thing belonging to a place. The final -i shifts to
      -a before the suffix, a change also seen in Ruotsi → ruotsalainen
      ("Swedish").

    role: 'demonym_adjective'

    explorations:
      - word: 'suomi'
        target: 'Finland'
        morphology:
          kind: 'case'
          case: 'nominative'
          stem: 'suomi-'
        formation: 'suomi'
        explanation: 'This is the base word.'
        origin: generated
        status: valid

      - word: 'suomalainen'
        target: 'Finnish (person)'
        morphology:
          kind: 'derivation'
          suffix: '-lainen'
          source_type: 'noun'
          result_type: 'demonym'
        formation: 'suomi → suoma- + -lainen → suomalainen'
        explanation: 'The demonym suffix -lainen names someone from Suomi.'
        origin: source
        status: valid
        priority: high

      - word: 'ruotsalainen'
        target: 'Swedish (person)'
        morphology:
          kind: 'derivation'
          suffix: '-lainen'
          source_type: 'noun'
          result_type: 'demonym'
        formation: 'ruotsi → ruotsa- + -lainen → ruotsalainen'
        explanation: 'The same pattern applied to Ruotsi ("Sweden").'
        origin: generated
        status: valid
        priority: high

      - word: 'amerikkalainen'
        target: 'American (person)'
        morphology:
          kind: 'derivation'
          suffix: '-lainen'
          source_type: 'noun'
          result_type: 'demonym'
        formation: 'Amerikka + -lainen → amerikkalainen'
        explanation: >
          This base word does not end in -i, so no vowel change is needed
          before the suffix.
        origin: generated
        status: valid

    applications:
      - id: 'suomalainen_identity'
        type: contextual_choice
        reasoning:
          kind: derivation
          relationship: nationality_identity
        source:
          text: 'Olen suomalainen mies ja isä.'
          literal: 'I-am Finnish man and father.'
          target: "I'm a Finnish man and a father."

        prompt:
          text: 'Olen _____ mies ja isä.'
          meaning: "I'm a Finnish man and a father."

        base_word: 'suomi'

        answer:
          word: 'suomalainen'

        choices:
          - 'suomi'
          - 'suomalainen'
          - 'suomea'
          - 'ruotsalainen'

        grammar_refs: []

        explanation:
          why_it_fits: >
            The sentence describes Lauri's nationality. Suomalainen, built
            from Suomi with -lainen, means "Finnish (person)."

        distractors:
          - word: 'suomi'
            grammar: {}
            meaning: 'Finland / Finnish (the country or language)'
            why_not: >
              Suomi names the country or language itself. The sentence
              needs the adjective describing the man's nationality.

          - word: 'suomea'
            grammar:
              case: 'partitive'
            meaning: 'Finnish (language, some)'
            why_not: >
              Suomea is used when talking about the Finnish language, such
              as speaking or studying it, not to describe a person's
              nationality.

          - word: 'ruotsalainen'
            grammar: {}
            meaning: 'Swedish (person)'
            why_not: >
              Ruotsalainen is built the same way from Ruotsi ("Sweden"),
              but Lauri is Finnish, not Swedish.

    vocabulary_ref: 'suomalainen'

    grammar_refs: []

  - id: 'm002'

    source:
      entry_id: '003'
      chunk_id: c1
      text: 'Minulla on vaimo ja kaksi lasta.'
      literal: 'On-me is wife and two of-child.'
      target: 'I have a wife and two children.'

    word: 'minulla'
    base_word: 'minä'
    type: 'pronoun'

    target: 'on me / I have'

    morphology:
      kind: 'case'
      case: 'adessive'
      ending: '-lla'
      stem: 'minu-'

    hint: >
      This is a form of the word for "I."

    formation: 'minä → minu- + -lla → minulla'

    explanation: >
      Minulla is the Adessive form of minä. Finnish has no verb "to have,"
      so possession is expressed with minulla on — literally "on me is,"
      meaning "I have."

    role: 'possessor'

    explorations:
      - word: 'minä'
        target: 'I'
        morphology:
          kind: 'case'
          case: 'nominative'
          stem: 'minä-'
        formation: 'minä'
        explanation: 'This is the base word.'
        origin: generated
        status: valid

      - word: 'minulla'
        target: 'on me / I have'
        morphology:
          kind: 'case'
          case: 'adessive'
          ending: '-lla'
          stem: 'minu-'
        formation: 'minä → minu- + -lla → minulla'
        explanation: 'Combined with on, this expresses possession.'
        origin: source
        status: valid
        priority: high

      - word: 'minun'
        target: 'my'
        morphology:
          kind: 'case'
          case: 'genitive'
          ending: '-n'
          stem: 'minu-'
        formation: 'minä → minu- + -n → minun'
        explanation: 'The Genitive form marks possession of a following noun.'
        origin: generated
        status: valid
        priority: high

      - word: 'minulle'
        target: 'to me'
        morphology:
          kind: 'case'
          case: 'allative'
          ending: '-lle'
          stem: 'minu-'
        formation: 'minä → minu- + -lle → minulle'
        explanation: 'The Allative form marks the person experiencing something.'
        origin: generated
        status: valid
        priority: high

    applications:
      - id: 'minulla_possession'
        type: contextual_choice
        reasoning:
          kind: case
          relationship: possessive_adessive_construction
        source:
          text: 'Minulla on vaimo ja kaksi lasta.'
          literal: 'On-me is wife and two of-child.'
          target: 'I have a wife and two children.'

        prompt:
          text: '_____ on vaimo ja kaksi lasta.'
          meaning: 'I have a wife and two children.'

        base_word: 'minä'

        answer:
          word: 'minulla'

        choices:
          - 'minä'
          - 'minun'
          - 'minulla'
          - 'minulle'

        grammar_refs:
          - 'adessive'

        explanation:
          why_it_fits: >
            Finnish expresses possession with the Adessive form of the
            possessor plus on: minulla on, "I have."

        distractors:
          - word: 'minä'
            grammar:
              case: 'nominative'
            meaning: 'I'
            why_not: >
              Minä is the plain subject form. The possessive construction
              needs the Adessive form minulla before on.

          - word: 'minun'
            grammar:
              case: 'genitive'
            meaning: 'my'
            why_not: >
              Minun marks possession of a following noun, as in minun
              nimi ("my name"), not the "have" construction with on.

          - word: 'minulle'
            grammar:
              case: 'allative'
            meaning: 'to me'
            why_not: >
              Minulle marks the person something is given or happens to,
              not the possessor in a minulla on construction.

    vocabulary_ref: 'minä'

    grammar_refs:
      - 'adessive'

  - id: 'm003'

    source:
      entry_id: '003'
      chunk_id: c4
      text: 'Minulla on vaimo ja kaksi lasta.'
      literal: 'On-me is wife and two of-child.'
      target: 'I have a wife and two children.'

    word: 'lasta'
    base_word: 'lapsi'
    type: 'noun'

    target: 'child (some, after a number)'

    morphology:
      kind: 'case'
      case: 'partitive'
      ending: '-a'
      stem: 'las-'

    hint: >
      This is the word for "child," used after a number.

    formation: 'lapsi → las- + -a → lasta'

    explanation: >
      Lasta is the Partitive singular form of lapsi. A quantity word like
      kaksi ("two") is followed by the partitive singular of the noun, not
      the plural.

    role: 'quantified_noun'

    explorations:
      - word: 'lapsi'
        target: 'child'
        morphology:
          kind: 'case'
          case: 'nominative'
          stem: 'lapsi-'
        formation: 'lapsi'
        explanation: 'This is the base word.'
        origin: generated
        status: valid

      - word: 'lasta'
        target: 'child (some, after a number)'
        morphology:
          kind: 'case'
          case: 'partitive'
          ending: '-a'
          stem: 'las-'
        formation: 'lapsi → las- + -a → lasta'
        explanation: 'Follows the quantity word kaksi.'
        origin: source
        status: valid
        priority: high

      - word: 'lapset'
        target: 'children / the kids'
        morphology:
          kind: 'case'
          case: 'nominative'
          number: 'plural'
          stem: 'laps-'
        formation: 'lapsi → laps- + -et → lapset'
        explanation: >
          The plural nominative is used without a number, as in Tuula ja
          lapset, "Tuula and the kids."
        origin: generated
        status: valid
        priority: high

      - word: 'lapsia'
        target: 'children (some, no exact count)'
        morphology:
          kind: 'case'
          case: 'partitive'
          number: 'plural'
          ending: '-a'
          stem: 'laps-'
        formation: 'lapsi → laps- + -ia → lapsia'
        explanation: 'Partitive plural, used without an exact number.'
        origin: generated
        status: valid

    applications:
      - id: 'lasta_partitive_after_number'
        type: contextual_choice
        reasoning:
          kind: case
          relationship: partitive_after_numbers
        source:
          text: 'Minulla on vaimo ja kaksi lasta.'
          literal: 'On-me is wife and two of-child.'
          target: 'I have a wife and two children.'

        prompt:
          text: 'Minulla on vaimo ja kaksi _____.'
          meaning: 'I have a wife and two children.'

        base_word: 'lapsi'

        answer:
          word: 'lasta'

        choices:
          - 'lapsi'
          - 'lasta'
          - 'lapset'
          - 'lapsia'

        grammar_refs:
          - 'partitive'

        explanation:
          why_it_fits: >
            Kaksi is a quantity word, and Finnish quantity words take the
            partitive singular of the following noun: kaksi lasta.

        distractors:
          - word: 'lapsi'
            grammar:
              case: 'nominative'
              number: 'singular'
            meaning: 'child'
            why_not: >
              Lapsi is the plain dictionary form. After the number kaksi,
              Finnish requires the partitive singular, not the nominative.

          - word: 'lapset'
            grammar:
              case: 'nominative'
              number: 'plural'
            meaning: 'children / the kids'
            why_not: >
              Lapset is the plural form used without a number, as in Tuula
              ja lapset. A number word like kaksi takes the partitive
              singular instead.

          - word: 'lapsia'
            grammar:
              case: 'partitive'
              number: 'plural'
            meaning: 'children (some, no exact count)'
            why_not: >
              Lapsia means "some children" without a specific count. After
              the exact number kaksi, Finnish uses the partitive singular
              lasta, not the partitive plural.

    vocabulary_ref: 'lapsi'

    grammar_refs:
      - 'partitive'

  - id: 'm004'

    source:
      entry_id: '004'
      chunk_id: c4
      text: 'Minä herään kello 6, kun herätyskello soi.'
      literal: 'I wake-up clock 6, when alarm-clock rings.'
      target: "I wake up at 6 o'clock, when the alarm clock rings."

    word: 'herätyskello'
    base_word: 'herätyskello'
    type: 'noun'

    target: 'alarm clock'

    morphology:
      kind: 'compound'
      parts:
        - 'herätys'
        - 'kello'

    hint: >
      This word is built from two smaller words: one about waking up, and
      the word for "clock."

    formation: 'herätys + kello → herätyskello'

    explanation: >
      Herätyskello is a compound of herätys ("waking, alarm") and kello
      ("clock"). Herätys itself comes from the verb herätä ("to wake up")
      with the noun-forming suffix -ys. Finnish compounds are written as one
      word, with the first part unchanged and the second part carrying any
      endings the sentence needs.

    role: 'compound_noun'

    explorations:
      - word: 'herätys'
        target: 'waking / alarm'
        morphology:
          kind: 'base_word'
        formation: 'herätys'
        explanation: 'The first part of the compound, from herätä.'
        origin: generated
        status: valid

      - word: 'kello'
        target: 'clock / time'
        morphology:
          kind: 'base_word'
        formation: 'kello'
        explanation: 'The second part of the compound.'
        origin: generated
        status: valid

      - word: 'herätyskello'
        target: 'alarm clock'
        morphology:
          kind: 'compound'
          parts:
            - 'herätys'
            - 'kello'
        formation: 'herätys + kello → herätyskello'
        explanation: 'The compound, in its plain nominative form.'
        origin: source
        status: valid
        priority: high

      - word: 'herätyskellot'
        target: 'alarm clocks'
        morphology:
          kind: 'compound'
          number: 'plural'
          parts:
            - 'herätys'
            - 'kello'
        formation: 'herätys + kello → herätyskello → herätyskellot'
        explanation: 'The compound in its plural form.'
        origin: generated
        status: valid

    applications:
      - id: 'herätyskello_ringing'
        type: contextual_choice
        reasoning:
          kind: compound
          relationship: compound_identification
        source:
          text: 'Minä herään kello 6, kun herätyskello soi.'
          literal: 'I wake-up clock 6, when alarm-clock rings.'
          target: "I wake up at 6 o'clock, when the alarm clock rings."

        prompt:
          text: 'Minä herään kello 6, kun _____ soi.'
          meaning: "I wake up at 6 o'clock, when the alarm clock rings."

        base_word: 'herätyskello'

        answer:
          word: 'herätyskello'

        choices:
          - 'kello'
          - 'herätys'
          - 'herätyskello'
          - 'herätyskellot'

        grammar_refs: []

        explanation:
          why_it_fits: >
            The sentence needs the single compound word for "alarm clock":
            herätyskello.

        distractors:
          - word: 'kello'
            grammar: {}
            meaning: 'clock / time'
            why_not: >
              Kello alone just means "clock" or "time." The sentence needs
              the specific compound for "alarm clock."

          - word: 'herätys'
            grammar: {}
            meaning: 'waking / alarm'
            why_not: >
              Herätys names the act of waking up, not the object that
              rings. The sentence needs the full compound herätyskello.

          - word: 'herätyskellot'
            grammar: {}
            meaning: 'alarm clocks'
            why_not: >
              Herätyskellot is plural. The sentence describes one alarm
              clock ringing, so the singular herätyskello fits.

    vocabulary_ref: 'herätyskello'

    grammar_refs: []

  - id: 'm005'

    source:
      entry_id: '005'
      chunk_id: c1
      text: 'Käyn ensin suihkussa ja puen sitten päälle.'
      literal: 'I-go first in-shower and I-put-on then onto.'
      target: 'First I take a shower, and then I get dressed.'

    word: 'suihkussa'
    base_word: 'suihku'
    type: 'noun'

    target: 'in the shower'

    morphology:
      kind: 'case'
      case: 'inessive'
      ending: '-ssa'
      stem: 'suihku-'

    hint: >
      This is the word for "shower," describing where the action happens.

    formation: 'suihku → suihku- + -ssa → suihkussa'

    explanation: >
      Suihkussa is the Inessive form of suihku. Together with käydä, käydä
      suihkussa is a fixed way of saying "to take a shower" — literally "to
      go in the shower."

    role: 'location'

    explorations:
      - word: 'suihku'
        target: 'shower'
        morphology:
          kind: 'case'
          case: 'nominative'
          stem: 'suihku-'
        formation: 'suihku'
        explanation: 'This is the base word.'
        origin: generated
        status: valid

      - word: 'suihkussa'
        target: 'in the shower'
        morphology:
          kind: 'case'
          case: 'inessive'
          ending: '-ssa'
          stem: 'suihku-'
        formation: 'suihku → suihku- + -ssa → suihkussa'
        explanation: 'Part of the fixed expression käydä suihkussa.'
        origin: source
        status: valid
        priority: high

      - word: 'suihkuun'
        target: 'into the shower'
        morphology:
          kind: 'case'
          case: 'illative'
          ending: '-un'
          stem: 'suihku-'
        formation: 'suihku → suihku- + -un → suihkuun'
        explanation: 'Movement into the shower, rather than being inside it.'
        origin: generated
        status: valid
        priority: high

      - word: 'suihkusta'
        target: 'out of the shower'
        morphology:
          kind: 'case'
          case: 'elative'
          ending: '-sta'
          stem: 'suihku-'
        formation: 'suihku → suihku- + -sta → suihkusta'
        explanation: 'Movement out of the shower.'
        origin: generated
        status: valid

    applications:
      - id: 'suihkussa_routine'
        type: contextual_choice
        reasoning:
          kind: case
          relationship: fixed_expression_location
        source:
          text: 'Käyn ensin suihkussa ja puen sitten päälle.'
          literal: 'I-go first in-shower and I-put-on then onto.'
          target: 'First I take a shower, and then I get dressed.'

        prompt:
          text: 'Käyn ensin _____ ja puen sitten päälle.'
          meaning: 'First I take a shower, and then I get dressed.'

        base_word: 'suihku'

        answer:
          word: 'suihkussa'

        choices:
          - 'suihku'
          - 'suihkussa'
          - 'suihkuun'
          - 'suihkusta'

        grammar_refs:
          - 'inessive'

        explanation:
          why_it_fits: >
            Käydä suihkussa is a fixed expression meaning "to take a
            shower," built with the Inessive form of suihku.

        distractors:
          - word: 'suihku'
            grammar:
              case: 'nominative'
            meaning: 'shower'
            why_not: >
              Suihku is the plain dictionary form. The expression käydä
              suihkussa needs the Inessive form.

          - word: 'suihkuun'
            grammar:
              case: 'illative'
            meaning: 'into the shower'
            why_not: >
              Suihkuun describes movement toward the shower. Käydä
              suihkussa instead describes being in the shower during the
              action, using the Inessive.

          - word: 'suihkusta'
            grammar:
              case: 'elative'
            meaning: 'out of the shower'
            why_not: >
              Suihkusta means "out of the shower." The sentence describes
              taking a shower, not leaving one.

    vocabulary_ref: 'suihku'

    grammar_refs:
      - 'inessive'

  - id: 'm006'

    source:
      entry_id: '006'
      chunk_id: c2
      text: 'Sen jälkeen teen keittiössä aamupalaa ja luen lehteä.'
      literal: 'That after I-make in-kitchen breakfast and I-read newspaper.'
      target: 'After that, I make breakfast in the kitchen and read the newspaper.'

    word: 'aamupalaa'
    base_word: 'aamupala'
    type: 'noun'

    target: 'breakfast (as the thing made)'

    morphology:
      kind: 'compound'
      parts:
        - 'aamu'
        - 'pala'
      case: 'partitive'
      ending: '-a'
      stem: 'aamupala-'

    hint: >
      This word is built from "morning" and "piece," and here it takes an
      object ending.

    formation: 'aamu + pala → aamupala; aamupala + -a → aamupalaa'

    explanation: >
      Aamupala is a compound of aamu ("morning") and pala ("piece, bite").
      Here it appears as aamupalaa, the Partitive object of teen, since
      making breakfast is treated as an ongoing, unbounded activity.

    role: 'compound_noun_partitive_object'

    explorations:
      - word: 'aamu'
        target: 'morning'
        morphology:
          kind: 'base_word'
        formation: 'aamu'
        explanation: 'The first part of the compound.'
        origin: generated
        status: valid

      - word: 'pala'
        target: 'piece / bite'
        morphology:
          kind: 'base_word'
        formation: 'pala'
        explanation: 'The second part of the compound.'
        origin: generated
        status: valid

      - word: 'aamupala'
        target: 'breakfast'
        morphology:
          kind: 'compound'
          parts:
            - 'aamu'
            - 'pala'
        formation: 'aamu + pala → aamupala'
        explanation: 'The compound, in its plain nominative form.'
        origin: generated
        status: valid
        priority: high

      - word: 'aamupalaa'
        target: 'breakfast (as the thing made)'
        morphology:
          kind: 'compound'
          parts:
            - 'aamu'
            - 'pala'
          case: 'partitive'
          ending: '-a'
        formation: 'aamupala → aamupala- + -a → aamupalaa'
        explanation: 'The Partitive object form, used with teen.'
        origin: source
        status: valid
        priority: high

    applications:
      - id: 'aamupalaa_object'
        type: contextual_choice
        reasoning:
          kind: case
          relationship: partitive_object
        source:
