metadata:
  pack_name: Finnish Class Transcript – Lesson Pack
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: Cleaned phrases from Finnish language class transcript with phonetics.

entries:

- id: "001"
  prompt: I am one hundred years old.
  answer:
    - Minä olen sata vuotta vanha.
  phonetic: MEE-nah OH-len SAH-tah VOO-oht-tah VAHN-hah

- id: "002"
  prompt: I am seventeen years old.
  answer:
    - Minä olen seitsemäntoista vuotta vanha.
  phonetic: MEE-nah OH-len SAYT-seh-MAEN-toy-stah VOO-oht-tah VAHN-hah

- id: "003"
  prompt: Why are you in Finland?
  answer:
    - Miksi sinä olet Suomessa?
  phonetic: MIK-see SEE-nah OH-let SOO-oh-meh-sah

- id: "004"
  prompt: Why are you not in America?
  answer:
    - Miksi sinä et ole Amerikassa?
  phonetic: MIK-see SEE-nah ET OH-leh AH-meh-ree-kah-sah

- id: "005"
  prompt: My wife works in Finland.
  answer:
    - Minun vaimoni on työssä Suomessa.
  phonetic: MEE-noon VAI-moh-nee on TYÖS-sah SOO-oh-meh-sah

- id: "006"
  prompt: What language do you speak?
  answer:
    - Mitä kieltä sinä puhut?
  phonetic: MEE-tah KIEL-tah SEE-nah POO-hoot

- id: "007"
  prompt: I speak Finnish.
  answer:
    - Minä puhun suomea.
  phonetic: MEE-nah POO-hoon SOO-oh-meh-ah

- id: "008"
  prompt: I speak Finnish, Swedish, German, French, and English.
  answer:
    - Minä puhun suomea, ruotsia, saksaa, ranskaa ja englantia.
  phonetic: MEE-nah POO-hoon SOO-oh-meh-ah RWOHT-see-ah SAK-sah RAHN-skah yah ENG-lahn-tee-ah

- id: "009"
  prompt: I speak a little Russian.
  answer:
    - Puhun vähän venäjää.
  phonetic: POO-hoon VAH-haen VEH-nae-yae

- id: "010"
  prompt: I also speak a little Spanish.
  answer:
    - Puhun myös vähän espanjaa.
  phonetic: POO-hoon MYÖS VAH-haen ES-pahn-yah

- id: "011"
  prompt: If you do not understand something, you can always say.
  answer:
    - Voit aina sanoa, jos et ymmärrä jotain.
  phonetic: VOIT AI-nah SAH-noh-ah yos ET UM-maer-rae JO-tain

- id: "012"
  prompt: Which country are you from?
  answer:
    - Minkä maalainen sinä olet?
  phonetic: MING-kah MAH-lai-nen SEE-nah OH-let

- id: "013"
  prompt: I am American.
  answer:
    - Minä olen amerikkalainen.
  phonetic: MEE-nah OH-len AH-meh-ree-kah-lai-nen

- id: "014"
  prompt: I am Finnish.
  answer:
    - Minä olen suomalainen.
  phonetic: MEE-nah OH-len SOO-mah-lai-nen

- id: "015"
  prompt: My children are Finnish and German.
  answer:
    - Minun lapseni ovat suomalaisia ja saksalaisia.
  phonetic: MEE-noon LAHP-seh-nee OH-vaht SOO-mah-lai-see-ah yah SAK-sah-lai-see-ah

- id: "016"
  prompt: When does the course begin?
  answer:
    - Milloin kurssi alkaa?
  phonetic: MIL-loin KUR-see AHK-lah

- id: "017"
  prompt: The course is Monday and Thursday at eight.
  answer:
    - Kurssi on maanantaina ja torstaina kello kahdeksan.
  phonetic: KUR-see on MAH-nahn-tai-nah yah TORST-ai-nah KEL-loh KAH-dek-sahn

- id: "018"
  prompt: How are you?
  answer:
    - Mitä kuuluu?
  phonetic: MEE-tah KOO-loo

- id: "019"
  prompt: Are you Finnish?
  answer:
    - Oletko sinä suomalainen?
  phonetic: OH-let-koh SEE-nah SOO-mah-lai-nen

- id: "020"
  prompt: Do you live in Finland?
  answer:
    - Asutko sinä Suomessa?
  phonetic: AH-soot-koh SEE-nah SOO-oh-meh-sah

- id: "021"
  prompt: I live in Helsinki.
  answer:
    - Asun Helsingissä.
  phonetic: AH-soon HEL-sing-iss-sah

- id: "022"
  prompt: I live in Jyväskylä in Finland.
  answer:
    - Minä asun Jyväskylässä Suomessa.
  phonetic: MEE-nah AH-soon YOO-vaes-koo-laes-sah SOO-oh-meh-sah

- id: "023"
  prompt: Do you travel on weekends?
  answer:
    - Matkustatko sinä viikonloppuna?
  phonetic: MAHT-koo-stat-koh SEE-nah VEE-kon-lop-poo-nah

- id: "024"
  prompt: Do you buy food today?
  answer:
    - Ostatko sinä ruokaa tänään?
  phonetic: OH-stat-koh SEE-nah ROO-oh-kah TAEN-naen

- id: "025"
  prompt: Do you pay with a bank card?
  answer:
    - Maksatko sinä pankkikortilla?
  phonetic: MAHK-sat-koh SEE-nah PAHNK-kee-kor-tee-lah

- id: "026"
  prompt: I pay.
  answer:
    - Kyllä, maksan.
  phonetic: KYL-lah MAHK-sahn

- id: "027"
  prompt: I speak Swedish.
  answer:
    - Minä puhun ruotsia.
  phonetic: MEE-nah POO-hoon RWOHT-see-ah

- id: "028"
  prompt: Finnish is difficult.
  answer:
    - Suomi on vaikeaa.
  phonetic: SOO-oh-mee on VAI-keh-ah

- id: "029"
  prompt: Mathematics is difficult.
  answer:
    - Matematiikka on vaikeaa.
  phonetic: MAH-teh-mah-TEE-kah on VAI-keh-ah

- id: "030"
  prompt: Coffee is hot.
  answer:
    - Kahvi on kuumaa.
  phonetic: KAH-vee on KOO-oo-mah

- id: "031"
  prompt: This phone is new.
  answer:
    - Tämä puhelin on uusi.
  phonetic: TAE-mah POO-heh-lin on OO-see

- id: "032"
  prompt: Summer is bright.
  answer:
    - Kesä on valoisa.
  phonetic: KEH-sah on VAH-loy-sah

- id: "033"
  prompt: Night is dark.
  answer:
    - Yö on pimeä.
  phonetic: YÖ on PEE-meh-ah

- id: "034"
  prompt: It is raining heavily.
  answer:
    - Sataa kaatamalla.
  phonetic: SAH-tah KAH-tah-mah-lah

- id: "035"
  prompt: It is windy.
  answer:
    - On tuulista.
  phonetic: on TOO-lee-stah

- id: "036"
  prompt: The sun is shining here.
  answer:
    - Täällä aurinko paistaa.
  phonetic: TAE-ael-lah OW-reeN-koh PIE-stah

- id: "037"
  prompt: It is very warm.
  answer:
    - On tosi lämmin.
  phonetic: on TOH-see LAEM-min