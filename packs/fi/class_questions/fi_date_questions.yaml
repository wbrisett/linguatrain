metadata:
  id: fi_date_questions
  pack_name: Finnish Date Questions
  version: 2
  author: Wayne Brissette
  description: Common questions about dates, days, and the weekend.

entries:

  - id: "001"
    prompt: What day is today?
    answer:
      - Mikä päivä tänään on?
    phonetic: MEE-kah PAI-vah TAEN-aen on

  - id: "002"
    prompt: Today is Thursday.
    answer:
      - Tänään on torstai.
    phonetic: TAEN-aen on TOR-stai

  - id: "003"
    prompt: What day is tomorrow?
    answer:
      - Mikä päivä on huomenna?
    phonetic: MEE-kah PAI-vah on HOO-oh-men-nah

  - id: "004"
    prompt: Tomorrow is Friday.
    answer:
      - Huomenna on perjantai.
    phonetic: HOO-oh-men-nah on PEHR-yan-tai

  - id: "005"
    prompt: What month is it?
    answer:
      - Mikä kuukausi nyt on?
    phonetic: MEE-kah KOO-kow-see NYOOT on

  - id: "006"
    prompt: It is March.
    answer:
      - Nyt on maaliskuu.
    phonetic: NYOOT on MAH-lee-skoo

  - id: "007"
    prompt: What date is today?
    answer:
      - Monesko päivä tänään on?
    phonetic: MOH-ness-koh PAI-vah TAEN-aen on

  - id: "008"
    prompt: Today is the fifth of March.
    answer:
      - Tänään on viides maaliskuuta.
    phonetic: TAEN-aen on VEE-des MAH-lee-skoo-tah

  - id: "009"
    prompt: When does the course start?
    answer:
      - Milloin kurssi alkaa?
    phonetic: MEEL-loyn KOOR-see AHL-kah

  - id: "010"
    prompt: The course starts on Monday.
    answer:
      - Kurssi alkaa maanantaina.
    phonetic: KOOR-see AHL-kah MAH-nahn-tai-nah

  - id: "011"
    prompt: What are you doing this weekend?
    answer:
      - Mitä teet viikonloppuna?
    phonetic: MEE-tah TAYT VEE-kon-lop-poo-nah

  - id: "012"
    prompt: I am studying Finnish this weekend.
    answer:
      - Opiskelen suomea viikonloppuna.
    phonetic: OH-pee-skeh-len SOO-oh-meh-ah VEE-kon-lop-poo-nah

  - id: "013"
    prompt: See you on the weekend.
    answer:
      - Nähdään viikonloppuna.
    phonetic: NAEH-daan VEE-kon-lop-poo-nah

  - id: "014"
    prompt: The weekend is coming.
    answer:
      - Viikonloppu tulee.
    phonetic: VEE-kon-lop-poo TOO-leh