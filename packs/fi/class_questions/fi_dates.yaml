metadata:
  id: "Finnish Basics – Dates"
  version: 1
  author: Wayne Brissette
  description: "Talking about days and dates."

entries:
  - id: "001"
    prompt: "What day is it today?"
    answer:
      - "Mikä päivä tänään on?"
    phonetic: "MEE-kah PAI-vah TAH-nahn on"

  - id: "002"
    prompt: "Today is Thursday."
    answer:
      - "Tänään on torstai."
    phonetic: "TAH-nahn on TOR-stai"

  - id: "003"
    prompt: "What day is tomorrow?"
    answer:
      - "Mikä päivä on huomenna?"
    phonetic: "MEE-kah PAI-vah on HOO-o-men-nah"

  - id: "004"
    prompt: "Tomorrow is Friday."
    answer:
      - "Huomenna on perjantai."
    phonetic: "HOO-o-men-nah on PER-yahn-tai"

  - id: "005"
    prompt: "Today is the fifth of March."
    answer:
      - "Tänään on viides maaliskuuta."
    phonetic: "TAH-nahn on VEE-des MAHL-ees-koo-tah"