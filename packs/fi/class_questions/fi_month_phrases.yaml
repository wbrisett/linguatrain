metadata:
  id: fi_month_phrases
  pack_name: Finnish Month Phrases
  version: 1
  author: Wayne Brissette
  description: Common sentences using Finnish months.

entries:

  - id: "001"
    prompt: In January it is cold.
    answer:
      - Tammikuussa on kylmä.
    phonetic: TAHM-mee-koo-sah on KUUL-mah

  - id: "002"
    prompt: In February it snows.
    answer:
      - Helmikuussa sataa lunta.
    phonetic: HEL-mee-koo-sah SAH-tah LOON-tah

  - id: "003"
    prompt: In March the weather is better.
    answer:
      - Maaliskuussa sää on parempi.
    phonetic: MAH-lee-skoo-sah SAEH on PAH-rem-pee

  - id: "004"
    prompt: In April the snow melts.
    answer:
      - Huhtikuussa lumi sulaa.
    phonetic: HOOH-tee-koo-sah LOO-mee SOO-lah

  - id: "005"
    prompt: In May spring begins.
    answer:
      - Toukokuussa alkaa kevät.
    phonetic: TOH-koh-koo-sah AHL-kah KEH-vat

  - id: "006"
    prompt: In June the days are long.
    answer:
      - Kesäkuussa päivät ovat pitkät.
    phonetic: KEH-sah-koo-sah PAI-vaht OH-vaht PEENG-kaht

  - id: "007"
    prompt: In July many people are on vacation.
    answer:
      - Heinäkuussa monet ovat lomalla.
    phonetic: HAY-nah-koo-sah MOH-net OH-vaht LOH-mah-lah

  - id: "008"
    prompt: In August school begins.
    answer:
      - Elokuussa koulu alkaa.
    phonetic: EH-loh-koo-sah KOH-loo AHL-kah

  - id: "009"
    prompt: In September autumn begins.
    answer:
      - Syyskuussa alkaa syksy.
    phonetic: SOOYS-koo-sah AHL-kah SOOK-soo

  - id: "010"
    prompt: In October it rains a lot.
    answer:
      - Lokakuussa sataa paljon.
    phonetic: LOH-kah-koo-sah SAH-tah PAHL-yon

  - id: "011"
    prompt: In November it is dark.
    answer:
      - Marraskuussa on pimeää.
    phonetic: MAHR-rah-skoo-sah on PEE-meh-ah

  - id: "012"
    prompt: In December it is Christmas.
    answer:
      - Joulukuussa on joulu.
    phonetic: YOH-loo-koo-sah on YOH-loo