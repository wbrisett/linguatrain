metadata:
  pack_name: "Finnish Basics – Possession"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Finnish possession structure using 'minulla on'."

entries:
  - id: "001"
    prompt: "Do you have a job?"
    answer:
      - "Onko sinulla työpaikka?"
    phonetic: "ON-koh SEE-noo-lah TUO-pai-kah"

  - id: "002"
    prompt: "I have a car."
    answer:
      - "Minulla on auto."
    phonetic: "MEE-noo-lah on AU-toh"

  - id: "003"
    prompt: "I do not have a car."
    answer:
      - "Minulla ei ole autoa."
    phonetic: "MEE-noo-lah ay OH-leh AU-toh-ah"