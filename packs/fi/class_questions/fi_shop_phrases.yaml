metadata:
  pack_name: "Everyday Shop Phrases"
  version: 1
  author: Wayne Brissette
  description: "Common phrases heard in Finnish shops, cafés, and service counters."

entries:

  - id: "001"
    prompt: "Do you need a bag?"
    answer:
      - "Tarvitsetko pussin?"
      - "Tarvitsetko kassin?"
    phonetic: "TAHR-vee-tset-koh POOS-sin"

  - id: "002"
    prompt: "Do you need a receipt?"
    answer:
      - "Tarvitsetko kuitin?"
      - "Tarvitsetko kuittia?"
    phonetic: "TAHR-vee-tset-koh KUI-tin"

  - id: "003"
    prompt: "Receipt with you?"
    answer:
      - "Kuitti mukaan?"
    phonetic: "KUI-tee MUH-kaan"

  - id: "004"
    prompt: "Cash or card?"
    answer:
      - "Käteinen vai kortti?"
      - "Käteistä vai kortilla?"
    phonetic: "KAE-teh-nen VAI KOR-tee"

  - id: "005"
    prompt: "Anything else?"
    answer:
      - "Haluatko muuta?"
    phonetic: "HAH-loo-aht-koh MOO-tah"

  - id: "006"
    prompt: "Do you have a loyalty card?"
    answer:
      - "Onko sinulla bonuskortti?"
      - "Onko sinulla etukortti?"
    phonetic: "ON-koh SEE-noo-lah BOH-noos-KOR-tee"

  - id: "007"
    prompt: "Do you want a bag?"
    answer:
      - "Haluatko pussin?"
    phonetic: "HAH-loo-aht-koh POOS-sin"

  - id: "008"
    prompt: "The total is ten euros."
    answer:
      - "Yhteensä kymmenen euroa."
    phonetic: "UUH-tehn-sah KYM-meh-nen EU-roh-ah"

  - id: "009"
    prompt: "It costs three euros ninety."
    answer:
      - "Se maksaa kolme yhdeksänkymmentä."
    phonetic: "SEH MAHK-sah KOL-meh YUH-dek-sahn-KUM-men-tah"

  - id: "010"
    prompt: "Thank you."
    answer:
      - "Kiitos."
    phonetic: "KEE-tos"

  - id: "011"
    prompt: "Thank you very much."
    answer:
      - "Kiitos paljon."
    phonetic: "KEE-tos PAHL-yon"

  - id: "012"
    prompt: "Here you go."
    answer:
      - "Ole hyvä."
    phonetic: "OH-leh HUU-vah"

  - id: "013"
    prompt: "Have a nice day."
    answer:
      - "Hyvää päivänjatkoa."
    phonetic: "HUU-vah PAI-vahn-yat-koh-ah"

  - id: "014"
    prompt: "Next, please."
    answer:
      - "Seuraava, kiitos."
    phonetic: "SEU-rah-vah KEE-tos"

  - id: "015"
    prompt: "Card reader is here."
    answer:
      - "Kortti tähän."
    phonetic: "KOR-tee TAH-han"
    
  - id: "016"
    prompt: "No bag, thank you."
    answer:
      - "Ei pussia, kiitos."
      - "Ei kassia, kiitos."
    phonetic: "AY POOS-see-ah KEE-tos"

  - id: "017"
    prompt: "No receipt, thank you."
    answer:
      - "Ei kuittia, kiitos."
    phonetic: "AY KUI-tee-ah KEE-tos"

  - id: "018"
    prompt: "No, I do not have one."
    answer:
      - "Ei ole."
      - "Ei ole, kiitos."
    phonetic: "AY OH-leh"
    
  - id: "020"
    prompt: "Pay"
    answer:
        - "Maksa"
    phonetic: "MAHK-sah"

  - id: "021"
    prompt: "Payment"
    answer:
        - "Maksu"
    phonetic: "MAHK-soo"
  - id: "022"
    prompt: "Print receipt"
    answer:
        - "Tulosta kuitti"
    phonetic: "TOO-lohs-tah KUI-tee"

  - id: "023"
    prompt: "No receipt"
    answer:
        - "Ei kuittia"
    phonetic: "AY KUI-tee-ah"
  
  