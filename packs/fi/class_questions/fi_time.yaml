metadata:
  pack_name: "Finnish Basics – Telling Time"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Basic Finnish expressions for telling time."

entries:
  - id: "001"
    prompt: "What time is it?"
    answer:
      - "Mitä kello on?"
    phonetic: "MEE-tah KEL-loh on"

  - id: "002"
    prompt: "It is eight o’clock."
    answer:
      - "Kello on kahdeksan."
    phonetic: "KEL-loh on KAH-dek-sahn"

  - id: "003"
    prompt: "Half past four."
    answer:
      - "Puoli viisi."
    phonetic: "PUO-lee VEE-see"

  - id: "004"
    prompt: "Quarter past three."
    answer:
      - "Kello on varttia yli kolme."
    phonetic: "KEL-loh on VAR-tee-ah UU-lee KOL-meh"

  - id: "005"
    prompt: "Quarter to five."
    answer:
      - "Kello on varttia vaille viisi."
    phonetic: "KEL-loh on VAR-tee-ah VAI-leh VEE-see"