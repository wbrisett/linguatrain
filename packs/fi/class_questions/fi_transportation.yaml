metadata:
  pack_name: "Finnish Basics – Transportation"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Talking about transportation in Finnish."

entries:
  - id: "001"
    prompt: "Do you drive a car?"
    answer:
      - "Ajatko autoa?"
    phonetic: "AH-yat-koh AU-toh-ah"

  - id: "002"
    prompt: "Not in Finland."
    answer:
      - "En Suomessa."
    phonetic: "EN SUO-mes-sah"

  - id: "003"
    prompt: "I take the tram."
    answer:
      - "Otan ratikan."
    phonetic: "OH-tahn RAH-tee-kahn"

  - id: "004"
    prompt: "I cycle."
    answer:
      - "Pyöräilen."
    phonetic: "PUU-rah-eye-len"

  - id: "005"
    prompt: "Yes, sometimes."
    answer:
      - "Joo, joskus."
      - "Kyllä, joskus."
    phonetic: "YOH YOS-koos"