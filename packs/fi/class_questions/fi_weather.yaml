metadata:
  pack_name: "Finnish Basics – Weather"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Talking about the weather."

entries:
  - id: "001"
    prompt: "The weather is bad."
    answer:
      - "Sää on huono."
    phonetic: "SAEH on HOO-no"

  - id: "002"
    prompt: "It is raining heavily."
    answer:
      - "Sataa kaatamalla."
    phonetic: "SAH-tah KAH-tah-mah-lah"

  - id: "003"
    prompt: "It is windy."
    answer:
      - "On tuulista."
    phonetic: "ON TOO-lis-tah"

  - id: "004"
    prompt: "The sun is shining."
    answer:
      - "Aurinko paistaa."
    phonetic: "AU-rin-koh PAI-stah"

  - id: "005"
    prompt: "It is warm."
    answer:
      - "On lämmin."
    phonetic: "ON LAM-min"

  - id: "006"
    prompt: "It is very hot."
    answer:
      - "On tosi kuuma."
    phonetic: "ON TOH-see KOO-mah"