metadata:
  pack_name: "Teacher Questions – Basic Conversation"
  version: 1
  author: Wayne Brissette
  description: "Common beginner Finnish questions asked by a teacher in class."

entries:
  - id: "001"
    prompt: "How are you?"
    answer:
      - "Mitä kuuluu?"
    phonetic: "MEE-tah KOO-loo"

  - id: "002"
    prompt: "Who are you?"
    answer:
      - "Kuka sinä olet?"
    phonetic: "KOO-kah SEE-nah OH-let"

  - id: "003"
    prompt: "What is this?"
    answer:
      - "Mikä tämä on?"
    phonetic: "MEE-kah TAH-mah on"

  - id: "004"
    prompt: "What course is this?"
    answer:
      - "Mikä kurssi tämä on?"
    phonetic: "MEE-kah KOOR-see TAH-mah on"

  - id: "005"
    prompt: "When does the course begin?"
    answer:
      - "Milloin kurssi alkaa?"
    phonetic: "MEEL-loin KOOR-see AHL-kah"

  - id: "006"
    prompt: "Where do you live?"
    answer:
      - "Missä sinä asut?"
    phonetic: "MEES-sah SEE-nah AH-soot"

  - id: "007"
    prompt: "Where is Helsinki?"
    answer:
      - "Missä Helsinki on?"
    phonetic: "MEES-sah HEL-sing-kee on"

  - id: "009"
    prompt: "Do you watch a lot of television?"
    answer:
      - "Katsotko paljon televisiota?"
    phonetic: "KAH-tsoht-koh PAHL-yon TEH-leh-vee-see-oh-tah"

  - id: "010"
    prompt: "Do you drive a car?"
    answer:
      - "Ajatko autoa?"
    phonetic: "AH-yat-koh AU-toh-ah"
