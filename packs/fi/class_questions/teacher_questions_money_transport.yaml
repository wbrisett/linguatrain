metadata:
  pack_name: "Teacher Questions – Prices and Transportation"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Teacher questions about money, shopping, and transportation."

entries:
  - id: "001"
    prompt: "What does coffee cost?"
    answer:
      - "Mitä kahvi maksaa?"
    phonetic: "MEE-tah KAH-vee MAHK-sah"

  - id: "002"
    prompt: "Where does coffee cost three ninety?"
    answer:
      - "Missä kahvi maksaa kolme yhdeksänkymmentä?"
    phonetic: "MEES-sah KAH-vee MAHK-sah KOL-meh YUH-dek-sahn-KUM-men-tah"

  - id: "003"
    prompt: "Do you pay by bank card?"
    answer:
      - "Maksatko pankkikortilla?"
    phonetic: "MAHK-saht-koh PAHNK-kee-kor-tee-lah"

  - id: "004"
    prompt: "What does a car cost?"
    answer:
      - "Mitä auto maksaa?"
    phonetic: "MEE-tah AU-toh MAHK-sah"

  - id: "005"
    prompt: "Do you have a job?"
    answer:
      - "Onko sinulla työpaikka?"
    phonetic: "ON-koh SEE-noo-lah TUO-pai-kah"
