metadata:
  id: "fi_everyday_phrases"
  version: 1
  languages:
    source:
      code: "en"
      name: "English"
    target:
      code: "fi-FI"
      name: "Finnish"
  tts:
    template: "Suomeksi: {text}."
  ui:
    correct: "✅ Oikein!"
    try_again: "Yritä uudelleen."
    replay_hint: "(Kirjoita 'r' toistaaksesi äänen)"
    also_accepted_prefix: "Myös käy:"
    phonetic_prefix: "ääntämys"
    prompt_prefix: "englanniksi"
    target_prefix: "suomeksi"
    correct_answer_prefix: "❌ Oikea vastaus:"
    correct_word_prefix: "❌ Oikea sana:"
    quit_message: "👋 Lopetetaan. Kiitos!"
    quiz_label: "Quiz"

entries:

  - id: "001"
    prompt: "Now this is under control."
    alternate_prompts:
      - "We have this under control now."
    answer:
      - "Nyt tämä on hallinnassa."
    phonetic: "Newt TAH-muh on HAH-leen-nahs-sah"

  - id: "002"
    prompt: "Everything is fine."
    alternate_prompts:
      - "Everything is okay."
    answer:
      - "Kaikki on kunnossa."
    phonetic: "KAIK-kee on KOON-nohs-sah"

  - id: "003"
    prompt: "No worries."
    alternate_prompts:
      - "No problem."
    answer:
      - "Ei hätää."
    phonetic: "Ey HAE-taa"

  - id: "004"
    prompt: "Got it."
    alternate_prompts:
      - "Understood."
      - "Clear."
    answer:
      - "Selvä."
    phonetic: "SEL-vah"

  - id: "005"
    prompt: "Let's see."
    alternate_prompts:
      - "We will see."
    answer:
      - "Katsotaan."
    phonetic: "KAHT-soh-TAAN"

  - id: "006"
    prompt: "Good thing."
    alternate_prompts:
      - "Nice."
      - "Great."
    answer:
      - "Hyvä juttu."
    phonetic: "HY-vah YOOT-too"

  - id: "007"
    prompt: "You're welcome."
    alternate_prompts:
      - "Here you go."
    answer:
      - "Ole hyvä."
    phonetic: "OH-leh HY-vah"

  - id: "008"
    prompt: "Thank you."
    alternate_prompts:
      - "Thanks."
    answer:
      - "Kiitos."
    phonetic: "KEE-tohs"

  - id: "009"
    prompt: "Good decision."
    answer:
      - "Hyvä päätös."
    phonetic: "HY-vah PAE-tuhs"

  - id: "010"
    prompt: "Hi, I am Antti."
    alternate_prompts:
      - "Hello, I am Antti."
    answer:
      - "Hei, minä olen Antti."
    phonetic: "HAY, MI-nah OH-len AHN-tee"

  - id: "011"
    prompt: "Good day. My name is Antti Virtanen."
    alternate_prompts:
      - "Hello. My name is Antti Virtanen."
    answer:
      - "Hyvää päivää. Minun nimeni on Antti Virtanen."
    phonetic: "HY-vah PAI-vah. MI-noon NEE-meh-nee on AHN-tee VEER-tah-nen"

  - id: "012"
    prompt: "Nice to meet you."
    answer:
      - "Kiva tavata."
    phonetic: "KEE-vah TAH-vah-tah"

  - id: "013"
    prompt: "Nice to meet you."
    alternate_prompts:
      - "Pleasure to meet you."
    answer:
      - "Hauska tutustua."
    phonetic: "HOWS-kah TOO-toos-too-ah"

  - id: "014"
    prompt: "Hi."
    alternate_prompts:
      - "Hello."
    answer:
      - "Hei."
    phonetic: "HAY"

  - id: "015"
    prompt: "Good day."
    alternate_prompts:
      - "Hello."
    answer:
      - "Hyvää päivää."
    phonetic: "HY-vah PAI-vah"

  - id: "016"
    prompt: "See you again."
    alternate_prompts:
      - "See you later."
    answer:
      - "Nähdään taas."
    phonetic: "NAEH-daan tahs"

  - id: "017"
    prompt: "Goodbye."
    alternate_prompts:
      - "Farewell."
    answer:
      - "Hyvästi."
    phonetic: "HY-vahs-tee"

  - id: "018"
    prompt: "Hi."
    alternate_prompts:
      - "Hey."
    answer:
      - "Moi."
    phonetic: "MOY"

  - id: "019"
    prompt: "Bye."
    alternate_prompts:
      - "Bye bye."
      - "See you."
    answer:
      - "Moi moi."
    phonetic: "MOY MOY"

  - id: "020"
    prompt: "How are you?"
    alternate_prompts:
      - "What's up?"
      - "How's it going?"
    answer:
      - "Mitä kuuluu?"
    phonetic: "MI-tah KOO-loo?"

  - id: "021"
    prompt: "How are you?"
    alternate_prompts:
      - "How do you feel?"
    answer:
      - "Kuinka voit?"
    phonetic: "KOO-een-kah voyt?"

  - id: "022"
    prompt: "Fine, thank you."
    alternate_prompts:
      - "I'm fine, thank you."
    answer:
      - "Hyvin, kiitos."
    phonetic: "HY-vin, KEE-tohs"

  - id: "023"
    prompt: "Not very well."
    alternate_prompts:
      - "I'm not very well."
    answer:
      - "En kovin hyvin."
    phonetic: "En KO-vin HY-vin"

  - id: "024"
    prompt: "Pretty good."
    alternate_prompts:
      - "Quite good."
      - "Doing pretty well."
    answer:
      - "Ihan hyvää."
    phonetic: "EE-hahn HY-vah"

  - id: "025"
    prompt: "Excuse me."
    alternate_prompts:
      - "Sorry."
    answer:
      - "Anteeksi."
    phonetic: "AHN-tehk-see"

  - id: "026"
    prompt: "Please forgive me."
    alternate_prompts:
      - "Forgive me."
    answer:
      - "Suokaa anteeksi."
    phonetic: "SWOH-kah AHN-tehk-see"

  - id: "027"
    prompt: "I didn't mean that."
    alternate_prompts:
      - "I did not mean that."
    answer:
      - "En tarkoittanut sitä."
    phonetic: "En TAR-koyt-tah-noot SEE-tah"

  - id: "028"
    prompt: "I am sorry."
    alternate_prompts:
      - "I'm sorry."
    answer:
      - "Olen pahoillani."
    phonetic: "OH-len PAH-hoyl-lah-nee"
