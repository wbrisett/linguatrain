metadata:
  pack_name: "Finnish Time Expressions"
  version: 1
  author: Wayne Brissette
  description: "Common Finnish expressions for telling time and exact amounts."

entries:

  - id: "tasan_001"
    prompt: "exactly; on the dot"
    answer:
      - "tasan"
    phonetic: "TAH-sahn"

  - id: "tasan_002"
    prompt: "exactly eight o'clock"
    answer:
      - "tasan kahdeksan"
      - "kello kahdeksan tasan"
    phonetic: "TAH-sahn KAH-dek-sahn"

  - id: "tasan_003"
    prompt: "Let's meet at exactly eight."
    answer:
      - "Tavataan kello kahdeksan tasan."
    phonetic: "TAH-vah-tahn KEL-loh KAH-dek-sahn TAH-sahn"

  - id: "tasan_004"
    prompt: "It costs exactly ten euros."
    answer:
      - "Se maksaa tasan kymmenen euroa."
    phonetic: "SEH MAHK-sah TAH-sahn KYM-meh-nen EU-roh-ah"

  - id: "tasan_005"
    prompt: "Let's split this evenly."
    answer:
      - "Jaetaan tämä tasan."
    phonetic: "YAH-eh-tahn TAH-mah TAH-sahn"

  - id: "tasan_006"
    prompt: "The game is tied."
    answer:
      - "Peli on tasan."
    phonetic: "PEH-lee on TAH-sahn"