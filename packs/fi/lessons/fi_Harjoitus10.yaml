metadata:
  pack_name: "Suomen Mestari – Harjoitus 10 (Questions)"
  version: 1
  source_lang: "fi"
  target_lang: "en"
  author: "Wayne Brissette"
  description: "Comprehension questions and model answers with translations and phonetics"

entries:

  - id: 001
    prompt: "Mitä Alex ja Pedro ostavat?"
    answer:
      - fi: "Alex ja Pedro ostavat jäätelöä."
        phonetic: "AH-leks yah PEH-droh OS-tah-vaht YAE-teh-luh-ah"
        en: "Alex and Pedro buy ice cream."

  - id: 002
    prompt: "Mitä jäätelö maksaa?"
    answer:
      - fi: "Jäätelö maksaa kolme euroa."
        phonetic: "YAE-teh-luh MAHK-sah KOL-meh EU-roh-ah"
        en: "The ice cream costs three euros."

  - id: 003
    prompt: "Miksi Olga ei osta jäätelöä?"
    answer:
      - fi: "Olga ei osta jäätelöä, koska hänellä ei ole rahaa."
        phonetic: "OL-gah ei OS-tah YAE-teh-luh-ah KOS-kah HAE-neh-la ei OH-leh RAH-hah-ah"
        en: "Olga does not buy ice cream because she does not have money."

  - id: 004
    prompt: "Missä he istuvat, puhuvat ja nauravat?"
    answer:
      - fi: "He istuvat puistossa, puhuvat ja nauravat."
        phonetic: "Heh IS-tu-vaht PUIS-tos-sah PU-hu-vaht yah NAU-ra-vaht"
        en: "They sit in the park, talk, and laugh."

  - id: 005
    prompt: "Minkämaalainen Olga on?"
    answer:
      - fi: "Olga on espanjalainen."
        phonetic: "OL-gah on ES-pan-yah-lai-nen"
        en: "Olga is Spanish."

  - id: 006
    prompt: "Kuka puhuu espanjaa?"
    answer:
      - fi: "Pedro puhuu espanjaa."
        phonetic: "PEH-droh PU-huu ES-pan-yah-ah"
        en: "Pedro speaks Spanish."

  - id: 007
    prompt: "Kuka puhuu portugalia?"
    answer:
      - fi: "Alex puhuu portugalia."
        phonetic: "AH-leks PU-huu POR-tu-gah-li-ah"
        en: "Alex speaks Portuguese."

  - id: 008
    prompt: "Missä Olga asuu?"
    answer:
      - fi: "Olga asuu Helsingissä."
        phonetic: "OL-gah AH-suu HEL-sing-gis-sae"
        en: "Olga lives in Helsinki."

  - id: 009
    prompt: "Asuuko Pedro Helsingissä?"
    answer:
      - fi: "Ei, Pedro ei asu Helsingissä."
        phonetic: "Ei PEH-droh ei AH-su HEL-sing-gis-sae"
        en: "No, Pedro does not live in Helsinki."

  - id: 010
    prompt: "Käteisellä vai kortilla?"
    answer:
      - fi: "Kortilla, kiitos."
        phonetic: "KOR-til-lah KEE-tos"
        en: "By card, please."
      - fi: "Käteisellä, kiitos."
        phonetic: "KAE-tei-sel-lah KEE-tos"
        en: "In cash, please."

  - id: 011
    prompt: "Tarvitko kuittia?"
    answer:
      - fi: "En tarvitse kuittia, kiitos."
        phonetic: "En TAR-vee-tseh KU-it-ti-ah KEE-tos"
        en: "I do not need a receipt, thank you."
      - fi: "Tarvitsen kuitin, kiitos."
        phonetic: "TAR-vee-tsen KUI-tin KEE-tos"
        en: "I need a receipt, thank you."

  - id: 012
    prompt: "Mikä sinun nimi on?"
    answer:
      - fi: "Minun nimeni on Wayne."
        phonetic: "MEE-noon NEE-meh-nee on Wayne"
        en: "My name is Wayne."
      - fi: "Nimeni on Wayne."
        phonetic: "NEE-meh-nee on Wayne"
        en: "My name is Wayne."

  - id: 013
    prompt: "Miten se kirjoitetaan?"
    answer:
      - fi: "Se kirjoitetaan W-A-Y-N-E."
        phonetic: "Seh KIR-yoi-teh-taan W-A-Y-N-E"
        en: "It is written W-A-Y-N-E."

  - id: 014
    prompt: "Mitä sinulle kuuluu?"
    answer:
      - fi: "Minulle kuuluu hyvää, kiitos."
        phonetic: "MEE-noo-leh KUU-loo HUU-vaa KEE-tos"
        en: "I am doing well, thank you."
      - fi: "Ihan hyvää."
        phonetic: "EE-han HUU-vaa"
        en: "Quite well."

  - id: 015
    prompt: "Kuinka vanha sinä olet?"
    answer:
      - fi: "Olen kuusikymmentä vuotta vanha."
        phonetic: "OH-len KUU-see-KUHM-men-ta VUO-ta VAN-ha"
        en: "I am sixty years old."

  - id: 016
    prompt: "Milloin kurssi on?"
    answer:
      - fi: "Kurssi on maanantaina ja keskiviikkona."
        phonetic: "KUR-see on MAA-nan-tai-nah yah KES-kee-veek-ko-nah"
        en: "The course is on Monday and Wednesday."
      - fi: "Kurssi alkaa kello yhdeksän."
        phonetic: "KUR-see AH-kla KEL-lo YUH-dek-san"
        en: "The course starts at nine o'clock."

  - id: 017
    prompt: "Mikä päivä tänään on?"
    answer:
      - fi: "Tänään on maanantai."
        phonetic: "TAE-naen on MAA-nan-tai"
        en: "Today is Monday."

  - id: 018
    prompt: "Missä sinä asut?"
    answer:
      - fi: "Minä asun Vaasassa."
        phonetic: "MEE-na AH-sun VAA-sas-sah"
        en: "I live in Vaasa."
      - fi: "Asun Vaasassa."
        phonetic: "AH-sun VAA-sas-sah"
        en: "I live in Vaasa."

  - id: 019
    prompt: "Hei!"
    answer:
      - fi: "Hei!"
        phonetic: "Hei"
        en: "Hi!"
      - fi: "Moi!"
        phonetic: "Moi"
        en: "Hi!"

  - id: 020
    prompt: "Haluaisin kahvia, kiitos."
    answer:
      - fi: "Selvä. Tulee heti."
        phonetic: "SEL-vaa TU-leh HE-ti"
        en: "Alright. Coming right up."
      - fi: "Totta kai."
        phonetic: "TOT-ta kai"
        en: "Of course."

  - id: 021
    prompt: "Hei, mitä sinä etsit?"
    answer:
      - fi: "Minä etsin pöytälamppua."
        phonetic: "MEE-na ET-sin POY-ta-lamp-pu-ah"
        en: "I am looking for a table lamp."
      - fi: "Etsin pöytälamppua."
        phonetic: "ET-sin POY-ta-lamp-pu-ah"
        en: "I am looking for a table lamp."

  - id: 022
    prompt: "Mitä haluaisit?"
    answer:
      - fi: "Haluaisin kahvia, kiitos."
        phonetic: "HA-luai-sin KAH-vi-ah KEE-tos"
        en: "I would like coffee, please."

  - id: 027
    prompt: "Uh, onpa kamala ilma tänään!"
    answer:
      - fi: "No niin on!"
        phonetic: "No NEE-n on"
        en: "Yes, it really is!"
      - fi: "Niin on."
        phonetic: "NEE-n on"
        en: "It is."

  - id: 028
    prompt: "Ihanaa, että aurinko paistaa!"
    answer:
      - fi: "Joo, ja on tosi lämmin!"
        phonetic: "YOH yah on TO-see LAEM-min"
        en: "Yes, and it is really warm!"
      - fi: "Niinpä!"
        phonetic: "NEE-npa"
        en: "Exactly!"