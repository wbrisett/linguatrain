metadata:
  pack_name: "Suomen Mestari – Harjoitus 10 (Questions)"
  version: 1
  source_lang: en
  target_lang: fi
  author: Wayne Brissette
  description: "Comprehension questions and model answers with translations and phonetics (engine-native)"

entries:

  - id: "001"
    prompt: "Alex and Pedro buy ice cream."
    answer:
      - "Alex ja Pedro ostavat jäätelöä."
    phonetic: "AH-leks yah PEH-droh OS-tah-vaht YAE-teh-luh-ah"

  - id: "002"
    prompt: "The ice cream costs three euros."
    answer:
      - "Jäätelö maksaa kolme euroa."
    phonetic: "YAE-teh-luh MAHK-sah KOL-meh EU-roh-ah"

  - id: "003"
    prompt: "Olga does not buy ice cream because she does not have money."
    answer:
      - "Olga ei osta jäätelöä, koska hänellä ei ole rahaa."
    phonetic: "OL-gah ei OS-tah YAE-teh-luh-ah KOS-kah HAE-neh-la ei OH-leh RAH-hah-ah"

  - id: "004"
    prompt: "They sit in the park, talk, and laugh."
    answer:
      - "He istuvat puistossa, puhuvat ja nauravat."
    phonetic: "Heh IS-tu-vaht PUIS-tos-sah PU-hu-vaht yah NAU-ra-vaht"

  - id: "005"
    prompt: "Olga is Spanish."
    answer:
      - "Olga on espanjalainen."
    phonetic: "OL-gah on ES-pan-yah-lai-nen"

  - id: "006"
    prompt: "Pedro speaks Spanish."
    answer:
      - "Pedro puhuu espanjaa."
    phonetic: "PEH-droh PU-huu ES-pan-yah-ah"

  - id: "007"
    prompt: "Alex speaks Portuguese."
    answer:
      - "Alex puhuu portugalia."
    phonetic: "AH-leks PU-huu POR-tu-gah-li-ah"

  - id: "008"
    prompt: "Olga lives in Helsinki."
    answer:
      - "Olga asuu Helsingissä."
    phonetic: "OL-gah AH-suu HEL-sing-gis-sae"

  - id: "009"
    prompt: "No, Pedro does not live in Helsinki."
    answer:
      - "Ei, Pedro ei asu Helsingissä."
    phonetic: "Ei PEH-droh ei AH-su HEL-sing-gis-sae"

  - id: "010"
    prompt: "By card, please."
    alternate_prompts:
      - "In cash, please."
    answer:
      - "Kortilla, kiitos."
      - "Käteisellä, kiitos."
    phonetic: "KOR-til-lah KEE-tos / KAE-tei-sel-lah KEE-tos"

  - id: "011"
    prompt: "I do not need a receipt, thank you."
    alternate_prompts:
      - "I need a receipt, thank you."
    answer:
      - "En tarvitse kuittia, kiitos."
      - "Tarvitsen kuitin, kiitos."
    phonetic: "En TAR-vee-tseh KUI-tee-ah KEE-tos / TAR-vee-tsen KUI-tin KEE-tos"

  - id: "012"
    prompt: "My name is Wayne."
    answer:
      - "Minun nimeni on Wayne."
      - "Nimeni on Wayne."
    phonetic: "MEE-noon NEE-meh-nee on Wayne / NEE-meh-nee on Wayne"

  - id: "013"
    prompt: "It is written W-A-Y-N-E."
    answer:
      - "Se kirjoitetaan W-A-Y-N-E."
    phonetic: "Seh KIR-yoi-teh-taan W-A-Y-N-E"

  - id: "014"
    prompt: "I am doing well, thank you."
    alternate_prompts:
      - "Quite well."
    answer:
      - "Minulle kuuluu hyvää, kiitos."
      - "Ihan hyvää."
    phonetic: "MEE-noo-leh KUU-loo HUU-vaa KEE-tos / EE-hahn HUU-vaa"

  - id: "015"
    prompt: "I am sixty years old."
    answer:
      - "Olen kuusikymmentä vuotta vanha."
    phonetic: "OH-len KUU-see-KUHM-men-ta VUO-ta VAN-ha"

  - id: "016"
    prompt: "The course is on Monday and Wednesday."
    alternate_prompts:
      - "The course starts at nine o'clock."
    answer:
      - "Kurssi on maanantaina ja keskiviikkona."
      - "Kurssi alkaa kello yhdeksän."
    phonetic: "KUR-see on MAA-nan-tai-nah yah KES-kee-veek-ko-nah / KUR-see AH-kla KEL-lo YUH-dek-san"

  - id: "017"
    prompt: "Today is Monday."
    answer:
      - "Tänään on maanantai."
    phonetic: "TAE-naen on MAA-nan-tai"

  - id: "018"
    prompt: "I live in Vaasa."
    answer:
      - "Minä asun Vaasassa."
      - "Asun Vaasassa."
    phonetic: "MEE-nah AH-sun VAA-sas-sah / AH-sun VAA-sas-sah"

  - id: "019"
    prompt: "Hi!"
    answer:
      - "Hei!"
      - "Moi!"
    phonetic: "Hei / Moi"

  - id: "020"
    prompt: "Alright. Coming right up."
    alternate_prompts:
      - "Of course."
    answer:
      - "Selvä. Tulee heti."
      - "Totta kai."
    phonetic: "SEL-vaa TU-leh HE-ti / TOT-ta kai"

  - id: "021"
    prompt: "I am looking for a table lamp."
    answer:
      - "Minä etsin pöytälamppua."
      - "Etsin pöytälamppua."
    phonetic: "MEE-nah ET-sin POY-ta-lamp-pu-ah / ET-sin POY-ta-lamp-pu-ah"

  - id: "022"
    prompt: "I would like coffee, please."
    answer:
      - "Haluaisin kahvia, kiitos."
    phonetic: "HA-luai-sin KAH-vi-ah KEE-tos"

  - id: "023"
    prompt: "Yes, it really is!"
    alternate_prompts:
      - "It is."
    answer:
      - "No niin on!"
      - "Niin on."
    phonetic: "No NEE-n on / NEE-n on"

  - id: "024"
    prompt: "Yes, and it is really warm!"
    alternate_prompts:
      - "Exactly!"
    answer:
      - "Joo, ja on tosi lämmin!"
      - "Niinpä!"
    phonetic: "YOH yah on TO-see LAEM-min / NEE-npa"