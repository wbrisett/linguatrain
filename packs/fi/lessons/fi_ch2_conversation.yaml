
metadata:
  pack_name: "Suomen Mestari – chapter 2"
  version: 1

entries:
- id: "001"
  speaker: "Olga"
  prompt:
  - Pedro, what nationality are you?
  answer:
  - Pedro, minkämaalainen sinä olet?
  phonetic: "PEH-droh, MINK-kah-MAA-lai-nen SEE-nah O-let?"

- id: "002"
  speaker: "Pedro"
  prompt:
  - I am Brazilian.
  answer:
  - Minä olen brasilialainen.
  phonetic: "MEE-nah OH-len BRA-zee-lee-ah-lai-nen"

- id: "003"
  speaker: "Pedro"
  prompt:
  - And you?
  answer:
  - Entä sinä?
  phonetic: "EN-tah SEE-nah?"

- id: "004"
  speaker: "Olga"
  prompt:
  - I am Russian.
  answer:
  - Minä olen venäläinen.
  phonetic: "MEE-nah OH-len VEH-nah-lai-nen"

- id: "005"
  speaker: "Pedro"
  prompt:
  - Where do you live?
  answer:
  - Missä sinä asut?
  phonetic: "MIS-sah SEE-nah AH-sut?"

- id: "006"
  speaker: "Olga"
  prompt:
  - I live in Puistola.
  answer:
  - Asun Puistolassa.
  phonetic: "AH-sun POO-ee-stoh-LAH-ssah"

- id: "007"
  speaker: "Olga"
  prompt:
  - It is in North Helsinki.
  answer:
  - Se on Pohjois-Helsingissä.
  phonetic: "SEH on POH-yoys HEL-sing-ee-ssah"

- id: "008"
  speaker: "Pedro"
  prompt:
  - I go home by bus 75.
  answer:
  - Menen kotiin bussilla 75.
  phonetic: "MEH-nen KOH-tee-in BOOS-see-lah SEET-se-MEN-tee-VEE-see"

- id: "009"
  speaker: "Pedro"
  prompt:
  - I do not live in Helsinki but in Espoo.
  answer:
  - Minä en asu Helsingissä vaan Espoossa.
  phonetic: "MEE-nah en AH-su HEL-sing-ee-ssah vaan ES-poh-ssah"

- id: "010"
  speaker: "Pedro"
  prompt:
  - I go home first by bus and then by metro.
  answer:
  - Menen kotiin ensin bussilla ja sitten metrolla.
  phonetic: "MEH-nen KOH-tee-in EN-sin BOOS-see-lah yah SIT-ten MET-roh-lah"

- id: "011"
  speaker: "Pedro"
  prompt:
  - Hey, my bus is coming now!
  answer:
  - Hei, nyt minun bussi tulee!
  phonetic: "HEY, NYT MEE-noon BOOS-see TOO-leh!"

- id: "012"
  speaker: "Olga"
  prompt:
  - Bye bye, see you tomorrow!
  answer:
  - Moi moi, nähdään huomenna!
  phonetic: "MOY MOY, NAHHD-daan HOO-oh-men-nah!"

- id: "013"
  speaker: "Pedro"
  prompt:
  - See you, bye!
  answer:
  - Nähdään, moikka!
  phonetic: "NAHHD-daan, MOYK-kah!"