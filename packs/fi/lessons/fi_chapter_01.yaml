  also_accepted:
    - "Thanks"

- id: "004"
  source: "Minulle kuuluu hyvää."
  phonetic: "MEE-noo-leh KOO-loo HUU-vah"
  target: "I am well"
  also_accepted:
    - "I am doing well"
    - "I'm well"

- id: "005"
  source: "Entä sinulle?"
  phonetic: "EN-tah SEE-noo-leh"
  target: "And you?"
  also_accepted:
    - "How about you?"

- id: "006"
  source: "Ihan hyvää, kiitos."
  phonetic: "EE-han HUU-vah KEE-tos"
  target: "Quite good, thank you"
  also_accepted:
    - "Pretty good, thanks"
    - "I'm quite well, thanks"

