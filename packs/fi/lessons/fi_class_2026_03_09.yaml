entries:

  - id: "001"
    prompt:
      - "Good morning!"
    answer:
      - "Hyvää huomenta!"
      - "Huomenta!"
    phonetic: "HOO-vah HOO-oh-men-tah"

  - id: "002"
    prompt:
      - "Good evening!"
    answer:
      - "Hyvää iltaa!"
    phonetic: "HOO-vah EEL-tah"

  - id: "003"
    prompt:
      - "How are you?"
    answer:
      - "Mitä kuuluu?"
    phonetic: "MEE-tah KOO-loo"

  - id: "004"
    prompt:
      - "I'm good, thank you."
    answer:
      - "Hyvää, kiitos."
