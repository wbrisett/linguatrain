metadata:
  id: "fi_time_basics_01"
  pack_name: "Finnish time basics (kello / yli / vaille / puoli / tasan)"
  version: 1

entries:
  - id: "001"
    prompt:
      - "What time is it?"
    answer:
      - "Mitä kello on?"
    phonetic: "MEE-tah KEL-loh on"

  - id: "002"
    prompt:
      - "second"
    answer:
      - "sekunti"
    phonetic: "SEH-koon-tee"

  - id: "003"
    prompt:
      - "minute"
    answer:
      - "minuutti"
    phonetic: "mee-NOO-tee"

  - id: "004"
    prompt:
      - "hour"
    answer:
      - "tunti"
    phonetic: "TOON-tee"

  - id: "005"
    prompt:
      - "quarter (of an hour)"
    answer:
      - "vartti"
      - "varttia"
    phonetic: "VAR-tee / VAR-tee-ah"

  - id: "006"
    prompt:
      - "half"
    answer:
      - "puoli"
    phonetic: "POO-lee"

  - id: "007"
    prompt:
      - "exactly (on the hour)"
      - "exactly"
    answer:
      - "tasan"
    phonetic: "TAH-san"

  - id: "008"
    prompt:
      - "past (time) — for example, quarter past four"
    answer:
      - "yli"
    phonetic: "Y-lee"

  - id: "009"
    prompt:
      - "to (time) — for example, quarter to five"
    answer:
      - "vaille"
    phonetic: "VAI-leh"

  - id: "010"
    prompt:
      - "It's four o'clock."
    answer:
      - "Kello on neljä."
    phonetic: "KEL-loh on NEL-yah"

  - id: "011"
    prompt:
      - "It's quarter past four."
      - "It's fifteen past four."
    answer:
      - "Kello on varttia yli neljä."
      - "Kello on viisitoista yli neljä."
    phonetic: "KEL-loh on VAR-tee-ah Y-lee NEL-yah / KEL-loh on VEE-see-toys-tah Y-lee NEL-yah"

  - id: "012"
    prompt:
      - "It's half past four. (Finnish: half five)"
      - "It's 4:30."
    answer:
      - "Kello on puoli viisi."
    phonetic: "KEL-loh on POO-lee VEE-see"

  - id: "013"
    prompt:
      - "It's quarter to five."
      - "It's fifteen to five."
    answer:
      - "Kello on varttia vaille viisi."
      - "Kello on viisitoista vaille viisi."
    phonetic: "KEL-loh on VAR-tee-ah VAI-leh VEE-see / KEL-loh on VEE-see-toys-tah VAI-leh VEE-see"

  - id: "014"
    prompt:
      - "8:00 in the morning"
    answer:
      - "Kello on kahdeksan aamulla."
    phonetic: "KEL-loh on KAH-dek-san AA-moo-lah"

  - id: "015"
    prompt:
      - "8:00 in the evening"
    answer:
      - "Kello on kahdeksan illalla."
    phonetic: "KEL-loh on KAH-dek-san IL-lah-lah"

  - id: "016"
    prompt:
      - "in the morning"
    answer:
      - "aamulla"
    phonetic: "AA-moo-lah"

  - id: "017"
    prompt:
      - "in the evening"
    answer:
      - "illalla"
    phonetic: "IL-lah-lah"

  - id: "018"
    prompt:
      - "at night"
    answer:
      - "yöllä"
    phonetic: "YOH-lah"

  - id: "019"
    prompt:
      - "in the afternoon"
    answer:
      - "iltapäivällä"
    phonetic: "IL-tah-PAI-vah-lah"

  - id: "020"
    prompt:
      - "during the morning (in the morning-time)"
    answer:
      - "aamupäivällä"
    phonetic: "AA-moo-PAI-vah-lah"