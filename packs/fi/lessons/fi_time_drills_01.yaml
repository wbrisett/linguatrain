metadata:
  id: "fi_time_drills_01"
  pack_name: "Finnish time drills (digital → Finnish)"
  version: 1

entries:
  - id: "001"
    prompt: ["4:00"]
    answer: ["Kello on neljä."]
    phonetic: "KEL-loh on NEL-yah"

  - id: "002"
    prompt: ["4:15"]
    answer:
      - "Kello on varttia yli neljä."
      - "Kello on viisitoista yli neljä."
    phonetic: "KEL-loh on VAR-tee-ah Y-lee NEL-yah / KEL-loh on VEE-see-toys-tah Y-lee NEL-yah"

  - id: "003"
    prompt: ["4:30"]
    answer: ["Kello on puoli viisi."]
    phonetic: "KEL-loh on POO-lee VEE-see"

  - id: "004"
    prompt: ["4:45"]
    answer:
      - "Kello on varttia vaille viisi."
      - "Kello on viisitoista vaille viisi."
    phonetic: "KEL-loh on VAR-tee-ah VAI-leh VEE-see / KEL-loh on VEE-see-toys-tah VAI-leh VEE-see"

  - id: "005"
    prompt: ["5:00"]
    answer: ["Kello on viisi."]
    phonetic: "KEL-loh on VEE-see"

  - id: "006"
    prompt: ["5:15"]
    answer:
      - "Kello on varttia yli viisi."
      - "Kello on viisitoista yli viisi."
    phonetic: "KEL-loh on VAR-tee-ah Y-lee VEE-see / KEL-loh on VEE-see-toys-tah Y-lee VEE-see"

  - id: "007"
    prompt: ["5:30"]
    answer: ["Kello on puoli kuusi."]
    phonetic: "KEL-loh on POO-lee KOO-see"

  - id: "008"
    prompt: ["5:45"]
    answer:
      - "Kello on varttia vaille kuusi."
      - "Kello on viisitoista vaille kuusi."
    phonetic: "KEL-loh on VAR-tee-ah VAI-leh KOO-see / KEL-loh on VEE-see-toys-tah VAI-leh KOO-see"

  - id: "009"
    prompt: ["8:00"]
    answer:
      - "Kello on kahdeksan."
      - "Kello on kahdeksan aamulla."
      - "Kello on kahdeksan illalla."
    phonetic: "KEL-loh on KAH-dek-san / KEL-loh on KAH-dek-san AA-moo-lah / KEL-loh on KAH-dek-san IL-lah-lah"

  - id: "010"
    prompt: ["20:00"]
    answer: ["Kello on kahdeksan illalla."]
    phonetic: "KEL-loh on KAH-dek-san IL-lah-lah"