metadata:
  id: fi_time_practice
  name: Finnish Time Practice

entries:

  - id: "001"
    prompt:
      - "What time is it?"
    answer:
      - "Mitä kello on?"
    phonetic: "MEE-tah KEL-loh ON"

  - id: "002"
    prompt:
      - "It is three o'clock."
      - "3:00"
    answer:
      - "Kello on kolme."
    phonetic: "KEL-loh on KOL-meh"

