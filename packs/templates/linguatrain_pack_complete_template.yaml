# Linguatrain Complete Pack Template
# Rename this file (for example: basics.yaml) and place it inside:
# packs/<target_lang>/
#
# Notes:
# - Use ISO 639-1 language codes (for example: en, fi, es, fr).
# - `answer` is always a YAML list, even if there is only one accepted answer.

metadata:
  id:
  version: 1      # 1 (until noted this should always be '1'
  languages:
    source:
      code:
      name:
    target:
      code:
      name:
  tts:
    template:
  ui:
    correct:
    try_again:
    replay_hint:
    also_accepted_prefix:
    phonetic_prefix:
    prompt_prefix:
    target_prefix:
    correct_answer_prefix:
    correct_word_prefix:
    quit_message:
    quiz_label:

entries:
  - id: "001"
    prompt: "Example prompt in source language."
    answer:
      - "Example answer in target language."
    phonetic: ""              # Optional
    notes: ""                 # Optional
    tags:                     # Optional
      - "example"
    audio:                    # Optional
      tts: true
    srs:                      # Optional
      difficulty: 1

  - id: "002"
    prompt: "Another example prompt."
    answer:
      - "Primary accepted answer."
      - "Alternate accepted answer."
    phonetic: ""              # Optional
    notes: ""                 # Optional
    tags: []                  # Optional (empty list)
    audio:                    # Optional
      tts: true
    srs:                      # Optional
      difficulty: 2
