# Linguatrain Minimal Pack Template
# Rename this file (for example: basics.yaml) and place it inside:
# packs/<target_lang>/
#
# Notes:
# - Use ISO 639-1 language codes (for example: en, fi, es, fr).
# - `answer` is always a YAML list, even if there is only one accepted answer.

metadata:
  pack_name: "Starter Pack Name"
  version: 1
  source_lang: "en"          # ISO 639-1 code
  target_lang: "fi"          # ISO 639-1 code
  author: "Your Name"
  description: "Short description of what this pack contains."

entries:
  - id: "001"
    prompt: "Example prompt in source language."
    answer:
      - "Example answer in target language."

  - id: "002"
    prompt: "Another example prompt."
    answer:
      - "Primary accepted answer."
      - "Alternate accepted answer."
    phonetic: "phonetic guide"
    notes: "Optional learning context"
    tags:
      - "example"
    audio:
      tts: true
    srs:
      difficulty: 2